name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    name: build-test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build is reproducible (committed bundle up to date)
        run: pnpm run check:build # tsup && git diff --exit-code -- scripts/ultrasearch.mjs

      - name: Test
        run: pnpm test

      - name: Smoke-run the committed bundle (offline, fixture backend)
        run: pnpm run demo # node scripts/ultrasearch.mjs gather --backends fixture ...

      - name: Assert dossier was produced
        run: test -f /tmp/ultrasearch-demo/manifest.json && test -f /tmp/ultrasearch-demo/sources.json

      - name: Retrieval evals (offline, deterministic)
        run: pnpm run eval

  # The shipped scripts/ultrasearch.mjs is a dependency-free bundle declaring
  # engines.node ">=18", but the dev toolchain (vitest 4) needs Node >=20.19 — so
  # build-test above can't prove the floor. This job runs ONLY the committed
  # bundle on Node 18, with no install, to guarantee the published ">=18" promise
  # holds (a Node 20+ API sneaking into src/ would build green on Node 24 yet
  # break for real users on 18; this catches that).
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 18 floor, zero-dep bundle)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Offline gather runs on Node 18
        run: |
          node scripts/ultrasearch.mjs gather --q "what is rate limiting" --mode topic --backends fixture --out "$RUNNER_TEMP/u18"
          test -f "$RUNNER_TEMP/u18/sources.json"
          test -f "$RUNNER_TEMP/u18/DOSSIER.md"

      - name: Render runs on Node 18
        run: |
          node scripts/ultrasearch.mjs render --run assets/example-dossier --out "$RUNNER_TEMP/example.html"
          test -f "$RUNNER_TEMP/example.html"

      - name: Grounding check runs on Node 18 (committed example must stay green)
        run: node scripts/ultrasearch.mjs check --run assets/example-dossier
